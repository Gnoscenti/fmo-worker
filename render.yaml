services:
  - type: worker
    name: fmo-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_UNPOOLED
        sync: false
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: LTX_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
