# Fly.io configuration for fmo-worker
# Founder Media OS — BullMQ Background Worker

app = "fmo-worker"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

# No HTTP service needed — this is a pure background worker
# BullMQ workers connect to Redis and process jobs continuously

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
